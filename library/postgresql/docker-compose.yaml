# Compose project owned by the lib-postgresql qavor template. ${VAR} values are
# interpolated by docker compose from the env qavor passes in (the composed
# service env, with the template's defaults applied).
services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${POSTGRES_PROJECT}
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      retries: 30
      start_period: 5s
    volumes:
      - data:/var/lib/postgresql/data
    networks: [default]

volumes:
  # Compose prefixes the volume with the project name (qavor-pg-<instance>_data),
  # so instances never share data. `qavor down` keeps it; `qavor purge` removes it.
  data: {}

networks:
  # One shared network across all qavor library services, so containers reach
  # each other by container name. Created by the `up` pre-step.
  default:
    name: ${DOCKER_NETWORK}
    external: true
