name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm lint

      - name: Check generated manifest types
        run: pnpm gen:types:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        id: test
        continue-on-error: true
        run: |
          node --import tsx --test \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=tap --test-reporter-destination=test-results.tap \
            'test/**/*.test.ts'

      - name: Test summary
        if: always() && hashFiles('test-results.tap') != ''
        run: |
          PASSED=$(grep "^# pass " test-results.tap | awk '{print $3}' || true)
          FAILED=$(grep "^# fail " test-results.tap | awk '{print $3}' || true)
          SKIPPED=$(grep "^# skipped " test-results.tap | awk '{print $3}' || true)
          TOTAL=$(grep "^# tests " test-results.tap | awk '{print $3}' || true)
          DURATION=$(grep "^# duration_ms " test-results.tap | awk '{print $3}' || true)
          PASSED=${PASSED:-0}; FAILED=${FAILED:-0}; SKIPPED=${SKIPPED:-0}
          TOTAL=${TOTAL:-0}; DURATION=${DURATION:-0}

          if [[ "$FAILED" -gt 0 ]]; then STATUS="âťŚ Tests Failed"; else STATUS="âś… Tests Passed"; fi

          {
            echo "## $STATUS"
            echo ""
            echo "| | Count |"
            echo "|---|---|"
            echo "| âś… Passed | $PASSED |"
            echo "| âťŚ Failed | $FAILED |"
            echo "| âŹ­ď¸Ź Skipped | $SKIPPED |"
            echo "| **Total** | **$TOTAL** |"
            echo ""
            echo "_Duration: ${DURATION}ms_"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$FAILED" -gt 0 ]]; then
            {
              echo ""
              echo "### Failed Tests"
              echo ""
              grep "^  " test-results.tap | grep " not ok " \
                | sed 's/^[[:space:]]*not ok [0-9]* - //' \
                | sort -u \
                | sed 's/^/- âťŚ /'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Assert tests passed
        if: always() && steps.test.outcome == 'failure'
        run: exit 1
