name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check generated manifest types
        run: pnpm gen:types:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  publish:
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Trusted publishing → npmjs (OIDC)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      # Trusted publishing requires npm CLI ≥ 11.5.1; Node may ship older npm.
      - name: Align npm CLI for OIDC publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Authentication is via OIDC (no NPM_TOKEN); configure Trusted Publisher → workflow file ci.yml on npmjs.
      - name: Publish to npm
        run: |
          PKG="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).name)")"
          VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version)")"
          if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG}@${VERSION} is already published; skipping."
            exit 0
          fi
          pnpm publish --access public --no-git-checks
