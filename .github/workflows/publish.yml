name: Publish

# Triggered by v* tags created by release.yml.
# Uses npm Trusted Publishing (OIDC) — register this workflow file on npmjs:
# package → Publishing → Trusted Publishers → GitHub Actions → workflow: publish.yml
on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag) to check out and publish. Defaults to the triggering ref.
        required: false
        type: string

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          VERSION="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")"
          echo "Publishing qavor@${VERSION}..."
          pnpm publish --no-git-checks

      - name: Publish summary
        run: |
          VERSION=$(jq -r .version package.json)
          PKG=$(jq -r .name package.json)
          {
            echo "## 📦 Published to npm"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Package** | [\`${PKG}\`](https://www.npmjs.com/package/${PKG}) |"
            echo "| **Version** | [\`${VERSION}\`](https://www.npmjs.com/package/${PKG}/v/${VERSION}) |"
            echo "| **Tag** | \`${{ inputs.ref || github.ref_name }}\` |"
            echo "| **npm** | https://www.npmjs.com/package/${PKG}/v/${VERSION} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # Build + push the container image to Docker Hub once the npm package is live.
  # The image installs qavor@<version> from npm, so this must run after publish.
  # Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN. When invoked via
  # workflow_call from release.yml, the caller must pass `secrets: inherit`.
  docker:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve image tags
        id: vars
        # NODE_MAJOR must match images/qavor-node/configuration.sh + the FROM base.
        env:
          NODE_MAJOR: "26"
        run: |
          VERSION="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "node_major=${NODE_MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Wait for npm availability
        # publish just ran, but registry propagation can lag a few seconds;
        # the image installs qavor@<version> from npm, so block until it resolves.
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          for i in $(seq 1 30); do
            if npm view "qavor@${VERSION}" version >/dev/null 2>&1; then
              echo "qavor@${VERSION} is available on npm"
              exit 0
            fi
            echo "waiting for qavor@${VERSION} on npm ($i)..."
            sleep 5
          done
          echo "qavor@${VERSION} not available on npm after timeout" >&2
          exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/qavor-node
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            QAVOR_VERSION=${{ steps.vars.outputs.version }}
          tags: |
            rubenhak/qavor:node${{ steps.vars.outputs.node_major }}-${{ steps.vars.outputs.version }}
            rubenhak/qavor:node${{ steps.vars.outputs.node_major }}
            rubenhak/qavor:latest

      - name: Docker summary
        run: |
          V="${{ steps.vars.outputs.version }}"
          T1="node${{ steps.vars.outputs.node_major }}-${V}"
          T2="node${{ steps.vars.outputs.node_major }}"
          {
            echo "## 🐳 Pushed to Docker Hub"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | [\`rubenhak/qavor\`](https://hub.docker.com/r/rubenhak/qavor) |"
            echo "| **Tags** | \`${T1}\`, \`${T2}\`, \`latest\` |"
            echo "| **qavor** | \`${V}\` (from npm) |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
          } >> "$GITHUB_STEP_SUMMARY"
