name: Release

# Manual version bump + publish. Uses npm Trusted Publishing (OIDC); register this
# workflow file on npmjs (package → Publishing → Trusted Publishers).
#
# Typical use: Actions → Release → Run workflow → choose semver bump → Run workflow.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump (updates package.json only; tag is always v<x.y.z>)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # commit + push version bump + tag
  id-token: write # Trusted publishing → npmjs (OIDC)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      # - name: Install pnpm
      #   uses: pnpm/action-setup@v6

      # - name: Install dependencies
      #   run: pnpm install --frozen-lockfile

      # - name: Bump version (${{ github.event.inputs.bump }})
      #   run: pnpm version ${{ github.event.inputs.bump }} --no-git-tag-version

      # - name: Build
      #   run: pnpm run build

      - run: npm install
      - run: npm run build --if-present      

      # - name: Check generated manifest types
      #   run: pnpm gen:types:check

      # - name: Typecheck
      #   run: pnpm typecheck

      # - name: Test
      #   run: pnpm test

      # Trusted publishing requires npm CLI >= 11.5.1 (bundled npm on older Node 22.x may be too old).
      # - name: Upgrade npm for Trusted Publishing (OIDC)
      #   run: npm install -g npm@^11.5.1

      - name: Publish to npm
        run: |
          PKG="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).name)")"
          VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version)")"
          echo "Publishing ${PKG}@${VERSION}..."
          # unset NODE_AUTH_TOKEN NPM_TOKEN
          npm publish --access public
          # pnpm publish --access public --no-git-checks

      - name: Commit version bump and push branch + release tag
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version)")"
          git config user.name "github-actions[bot]"
          git config user.email "ci@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:"${BRANCH_NAME}"
          git push origin "v${VERSION}"
