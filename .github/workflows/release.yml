name: Manual Release

# Bumps package.json, runs the full CI gate, commits + tags + pushes, then
# chains into publish.yml (workflow_call) to publish to npm.
# Typical use: Actions → Manual Release → Run workflow → choose semver bump → Run workflow.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump (patch / minor / major)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version (${{ github.event.inputs.bump }})
        run: pnpm version ${{ github.event.inputs.bump }} --no-git-tag-version

      - name: Build
        run: pnpm run build

      - name: Check generated manifest types
        run: pnpm gen:types:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Commit, tag, and push
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")"
          git config user.name "github-actions[bot]"
          git config user.email "ci@users.noreply.github.com"
          git add package.json
          git commit -m "🤖 Release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:"${BRANCH_NAME}"
          git push origin "v${VERSION}"

  publish:
    needs: release
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish.yml
