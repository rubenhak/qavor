name: Release

# Manual version bump + publish. Uses npm Trusted Publishing (OIDC); register this
# workflow file on npmjs (package → Publishing → Trusted Publishers).
# The publish step uses `npm publish` (not `pnpm publish`): pnpm’s own OIDC exchange
# often fails with 404; npm CLI runs the supported token exchange (pnpm/pnpm#9812).
# If npm requires a GitHub Environment, add `environment: <name>` on the job below
# so OIDC claims match the Trusted Publisher entry.
#
# Typical use: Actions → Release → Run workflow → choose semver bump → Run workflow.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump (updates package.json only; tag is always v<x.y.z>)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # commit + push version bump + tag
  id-token: write # Trusted publishing → npmjs (OIDC)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # registry-url is required for npm Trusted Publishing on GitHub Actions (npm docs).
      # Do not set NODE_AUTH_TOKEN on the publish step; use `env -u` so setup-node’s placeholder
      # token does not block OIDC (github.com/actions/setup-node/issues/1440).
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Check Versions
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          echo "Node Version:"
          node --version
          echo "Pnpm Version:"
          pnpm --version
          echo "NPM Version:"
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version (${{ github.event.inputs.bump }})
        run: pnpm version ${{ github.event.inputs.bump }} --no-git-tag-version

      - name: Build
        run: pnpm run build

      # - run: npm install
      # - run: npm run build --if-present      

      # - name: Check generated manifest types
      #   run: pnpm gen:types:check

      # - name: Typecheck
      #   run: pnpm typecheck

      # - name: Test
      #   run: pnpm test

      # Trusted publishing requires npm CLI >= 11.5.1; registry often returns misleading 404 / ENEEDAUTH
      # if the CLI is too old (github.com/npm/cli/issues/9088).
      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: npm install -g npm@^11.6.2

      # pnpm runs a separate OIDC token exchange (ERR_PNPM_AUTH_TOKEN_EXCHANGE / 404) that often
      # fails even when Trusted Publishing + npm are correct; npm publish uses npm's OIDC path.
      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          PKG="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).name)")"
          VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version)")"
          echo "Publishing ${PKG}@${VERSION}..."
          env -u NODE_AUTH_TOKEN npm publish --access public

      - name: Commit version bump and push branch + release tag
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version)")"
          git config user.name "github-actions[bot]"
          git config user.email "ci@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:"${BRANCH_NAME}"
          git push origin "v${VERSION}"
