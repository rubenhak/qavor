kind: service
name: web
description: A toy node service for tests.
runtime:
  native:
    enabled: true
    check_installed:
      description: Check that node is available.
      operations:
        - cmd: "node --version"
    install:
      description: Install node.
      operations:
        - cmd: "echo 'install node first'"
    prepare:
      description: Prepare the web service.
      operations:
        - cmd: "node -e 'process.stdout.write(\"ok\\n\")'"
    update_libraries:
      description: Update the web service libraries.
      operations:
        - cmd: "node -e 'process.stdout.write(\"updated\\n\")'"
    run:
      description: Run the web service.
      operations:
        - cmd: "node -e \"const http=require('http');const s=http.createServer((_,r)=>r.end('hi')).listen(process.env.PORT||0,()=>console.log('listening on',s.address().port));setInterval(()=>{},1000);\""

mode: native

env:
  common:
    PORT: 8081
    LOG_LEVEL: info
  native:
    LOG_FORMAT: text
