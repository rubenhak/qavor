kind: service
name: notes
description: Second toy python service.
runtime:
  native:
    enabled: true
    check_installed:
      description: Check that python3 is available.
      operations:
        - cmd: "python3 --version"
    prepare:
      description: Prepare the notes service.
      operations:
        - cmd: "python3 -c 'print(\"prepared\")'"
    run:
      description: Run the notes service.
      operations:
        - cmd: "python3 -c 'import time;print(\"notes running\");time.sleep(3600)'"

mode: native

env:
  common:
    PORT: 9090
