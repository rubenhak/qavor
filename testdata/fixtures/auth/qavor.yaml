kind: service
name: auth
description: A toy python/uv service for tests.
runtime:
  native:
    enabled: true
    check_installed:
      description: Check that python3 is available.
      operations:
        - cmd: "python3 --version"
    install:
      description: Install python3.
      operations:
        - cmd: "echo 'install python3 first'"
    prepare:
      description: Prepare the auth service.
      operations:
        - cmd: "python3 -c 'print(\"ok\")'"
    run:
      description: Run the auth service.
      operations:
        - cmd: "python3 -c 'import os,time;print(\"auth port=\"+str(os.environ.get(\"PORT\")));time.sleep(3600)'"

mode: native

env:
  common:
    PORT: 8080
    LOG_LEVEL: info
  native:
    LOG_FORMAT: text
